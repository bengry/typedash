name: Publish Preview

on:
  pull_request:
    branches:
      - '**'
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Build package
        run: vp pack

      - name: Publish preview package
        run: vp dlx pkg-pr-new publish --compact --no-template --packageManager=pnpm
