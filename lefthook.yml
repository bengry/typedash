pre-commit:
  parallel: true
  commands:
    fmt:
      glob: '*.{js,ts,tsx,json,jsonc,md,yaml,yml}'
      exclude:
        - pnpm-lock.yaml
      run: pnpm exec vp fmt --write --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    lint:
      glob: '*.{js,ts,tsx}'
      run: pnpm exec vp lint --fix {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

prepare-commit-msg:
  commands:
    czg:
      run: exec < /dev/tty && pnpm czg --hook || true
      interactive: true
